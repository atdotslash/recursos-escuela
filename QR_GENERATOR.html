<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Código QR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        #qrcode img {
            margin: 0 auto;
            border: 8px solid white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Generador QR</h1>
            <p class="text-slate-500 mt-2">Ingresa un enlace para crear tu código</p>
        </div>

        <div class="space-y-4">
            <div>
                <label for="url" class="block text-sm font-medium text-slate-700 mb-1">Enlace o URL</label>
                <input 
                    type="url" 
                    id="url" 
                    placeholder="https://ejemplo.com" 
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                >
            </div>
            
            <button 
                onclick="generateQR()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors shadow-lg shadow-blue-200"
            >
                Generar Código
            </button>
        </div>

        <div id="result-container" class="mt-8 hidden border-t pt-8 text-center animate-in fade-in zoom-in duration-300">
            <div id="qrcode" class="flex justify-center mb-6"></div>
            <p class="text-xs text-slate-400 mb-4 italic">Haz clic derecho en la imagen para guardarla</p>
            <button 
                onclick="clearQR()" 
                class="text-sm text-slate-500 hover:text-red-500 transition-colors"
            >
                Limpiar
            </button>
        </div>
    </div>

    <script>
        const qrContainer = document.getElementById("qrcode");
        const resultContainer = document.getElementById("result-container");
        const urlInput = document.getElementById("url");
        let qrcode = null;

        function generateQR() {
            const urlValue = urlInput.value.trim();

            if (urlValue === "") {
                alert("Por favor, ingresa un enlace válido.");
                return;
            }

            // Limpiar código anterior si existe
            qrContainer.innerHTML = "";
            resultContainer.classList.remove("hidden");

            // Crear el nuevo código QR
            qrcode = new QRCode(qrContainer, {
                text: urlValue,
                width: 200,
                height: 200,
                colorDark: "#1e293b", // Slate 800
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function clearQR() {
            urlInput.value = "";
            qrContainer.innerHTML = "";
            resultContainer.classList.add("hidden");
        }

        // Permitir generar al presionar "Enter"
        urlInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                generateQR();
            }
        });
    </script>

</body>
</html>
