<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Micrómetro - EEST N° 1 Zárate</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 100%;
            text-align: center;
        }
        
        /* --- ESTILO DEL ENCABEZADO DE LA ESCUELA --- */
        .school-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eaeaea;
            width: 100%;
        }
        .school-logo {
            width: 70px; 
            height: auto;
        }
        .school-info {
            text-align: left;
        }
        .school-info h3 {
            margin: 0 0 5px 0;
            color: #2c3e50;
            font-size: 2em;
        }
        .school-info a {
            text-decoration: none;
            color: #E1306C; 
            font-weight: bold;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .school-info a:hover {
            text-decoration: underline;
        }
        .instagram-icon {
            width: 22px;
            height: 22px;
        }
        /* ------------------------------------------------ */

        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fafbfc;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type=range] { width: 250px; cursor: pointer; }
        input[type=number] { width: 80px; padding: 5px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        label { font-weight: bold; color: #333; cursor: pointer; }
        .instructions { margin-top: 15px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    
    <!-- INCIO DEL ENCABEZADO INSTITUCIONAL -->
    <div class="school-header">
        <img src="https://atdotslash.github.io/recursos-escuela/LOGO-INDU.jpg" alt="Escudo EEST N° 1 Zárate" class="school-logo">
        <div class="school-info">
            <h3>EEST N° 1, Zárate, Pcia. de Bs. As.</h3>
            <a href="https://www.instagram.com/zarateindu/" target="_blank" title="Visitar Instagram de la escuela">
                <svg class="instagram-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.20 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                </svg>
                @zarateindu
            </a>
        </div>
    </div>
    <!-- FIN DEL ENCABEZADO INSTITUCIONAL -->

    <h2 style="margin-top: 6px; color: #2c3e50;">Simulador de Micrómetro</h2>
    
    <canvas id="micrometerCanvas" width="850" height="420"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label for="slider">Apertura (d):</label>
            <input type="range" id="slider" min="0" max="25" step="0.01" value="4.32">
            <input type="number" id="numberInput" min="0" max="25" step="0.01" value="4.32">
            <span>mm</span>
        </div>
        <div class="control-group">
            <input type="checkbox" id="hintCheckbox" checked>
            <label for="hintCheckbox" style="color: #c0392b;">Mostrar guías de lectura</label>
        </div>
    </div>
    
    <div class="instructions">
        Mueve el deslizador o ingresa un valor exacto para abrir/cerrar el micrómetro.<br>
        1 vuelta del tambor = 50 divisiones = 0.50 mm.<br>
        Preparado por: Prof. SANDOVAL Edgardo | 2026
    </div>
</div>

<script>
    const canvas = document.getElementById('micrometerCanvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('slider');
    const numberInput = document.getElementById('numberInput');
    const hintCheckbox = document.getElementById('hintCheckbox');

    let value = 4.32; 
    const PX_PER_MM = 15; 
    const ANVIL_X = 150; 
    const SLEEVE_START_X = 400; 
    const CENTER_Y = 200; 

    function init() {
        slider.addEventListener('input', (e) => updateValue(parseFloat(e.target.value)));
        numberInput.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value);
            if (!isNaN(val)) {
                if (val > 25) val = 25;
                if (val < 0) val = 0;
                updateValue(val);
            }
        });
        hintCheckbox.addEventListener('change', draw);
        draw();
    }

    function updateValue(newVal) {
        value = newVal;
        slider.value = value;
        numberInput.value = value.toFixed(2);
        draw();
    }

    function drawArrow(fromX, fromY, toX, toY) {
        const headlen = 10;
        const angle = Math.atan2(toY - fromY, toX - fromX);
        ctx.beginPath();
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
        ctx.stroke();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const gap = value * PX_PER_MM;

        ctx.beginPath();
        ctx.arc(275, 220, 125, 0, Math.PI); 
        ctx.lineWidth = 35;
        ctx.strokeStyle = '#5B7A8C'; 
        ctx.stroke();

        ctx.fillStyle = '#888';
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText("0.01 mm", 275, 360);
        ctx.font = '12px Arial';
        ctx.fillText("0 - 25 mm", 275, 375);

        ctx.fillStyle = '#5B7A8C';
        ctx.fillRect(132.5, 180, 35, 45); 
        ctx.fillRect(382.5, 180, 35, 45); 

        ctx.fillStyle = '#ccc';
        ctx.fillRect(ANVIL_X - 10, 185, 10, 30);
        ctx.fillStyle = '#999';
        ctx.fillRect(ANVIL_X - 2, 185, 2, 30); 

        ctx.fillStyle = '#000';
        if (value > 0) ctx.fillRect(ANVIL_X, 160, gap, 80);

        // --- HUSILLO (Varilla móvil) --- Cambiado a azul acero (#B0C4DE)
        ctx.fillStyle = '#B0C4DE'; 
        ctx.fillRect(ANVIL_X + gap, 188, 250, 24);

        ctx.fillStyle = '#23527a'; 
        ctx.fillRect(SLEEVE_START_X, 180, 25 * PX_PER_MM + 40, 40);
        
        ctx.beginPath();
        ctx.moveTo(SLEEVE_START_X, CENTER_Y);
        ctx.lineTo(SLEEVE_START_X + 25 * PX_PER_MM + 20, CENTER_Y);
        ctx.lineWidth = 1;
        ctx.strokeStyle = '#000';
        ctx.stroke();

        ctx.fillStyle = '#000';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.font = '12px Arial';
        
        for (let i = 0; i <= 25; i++) {
            let x = SLEEVE_START_X + i * PX_PER_MM;
            ctx.beginPath();
            ctx.moveTo(x, CENTER_Y);
            let tickLen = (i % 5 === 0) ? 15 : 8;
            ctx.lineTo(x, CENTER_Y - tickLen);
            ctx.stroke();
            if (i % 5 === 0) ctx.fillText(i, x, CENTER_Y - 18);
            if (i < 25) {
                let x05 = x + 0.5 * PX_PER_MM;
                ctx.beginPath();
                ctx.moveTo(x05, CENTER_Y);
                ctx.lineTo(x05, CENTER_Y + 8);
                ctx.stroke();
            }
        }

        const thimbleX = SLEEVE_START_X + gap;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(thimbleX, 180);
        ctx.lineTo(thimbleX + 40, 140);
        ctx.lineTo(thimbleX + 220, 140);
        ctx.lineTo(thimbleX + 220, 260);
        ctx.lineTo(thimbleX + 40, 260);
        ctx.lineTo(thimbleX, 220);
        ctx.closePath();
        
        // --- TAMBOR MÓVIL --- Cambiado a azul metálico medio (#82A0BC)
        ctx.fillStyle = '#82A0BC'; 
        ctx.fill();
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = '#000';
        ctx.stroke();
        ctx.clip(); 

        const THIMBLE_DIV_HEIGHT = 5; 
        const TOTAL_THIMBLE_HEIGHT = 50 * THIMBLE_DIV_HEIGHT;
        const thimbleReading = (value % 0.5) * 100; 

        ctx.fillStyle = '#000';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.font = '14px Arial';

        for (let copy = -1; copy <= 1; copy++) {
            for (let i = 0; i < 50; i++) {
                let y = CENTER_Y + (thimbleReading - i) * THIMBLE_DIV_HEIGHT + (copy * TOTAL_THIMBLE_HEIGHT);
                ctx.beginPath();
                ctx.moveTo(thimbleX, y);
                let tickLength = (i % 5 === 0) ? 20 : 10;
                ctx.lineTo(thimbleX + tickLength, y);
                ctx.stroke();
                if (i % 5 === 0) ctx.fillText(i, thimbleX + tickLength + 5, y);
            }
        }
        ctx.restore(); 

        if (hintCheckbox.checked) {
            let mainVal = Math.floor(value / 0.5) * 0.5;
            let thimVal = value - mainVal;

            ctx.lineWidth = 1.5;
            ctx.font = 'bold 18px Arial';
            
            ctx.fillStyle = '#d32f2f';
            ctx.strokeStyle = '#d32f2f';
            let mainX = SLEEVE_START_X + mainVal * PX_PER_MM;
            ctx.textAlign = 'center';
            ctx.fillText(mainVal.toFixed(2) + ' mm', mainX, 100);
            drawArrow(mainX, 110, mainX, 175);

            ctx.textAlign = 'left';
            ctx.fillText(thimVal.toFixed(2) + ' mm', thimbleX + 45, 310);
            drawArrow(thimbleX + 50, 290, thimbleX + 5, CENTER_Y + 5);

            if (value > 0) {
                ctx.fillStyle = '#1976d2';
                ctx.strokeStyle = '#1976d2';
                ctx.textAlign = 'center';
                let midX = ANVIL_X + gap / 2;
                ctx.fillText('d = ' + value.toFixed(2) + ' mm', midX, 270);
                
                ctx.beginPath();
                ctx.moveTo(ANVIL_X, 160); ctx.lineTo(ANVIL_X, 250);
                ctx.moveTo(ANVIL_X + gap, 160); ctx.lineTo(ANVIL_X + gap, 250);
                ctx.stroke();
                
                drawArrow(midX - 20, 240, ANVIL_X, 240);
                drawArrow(midX + 20, 240, ANVIL_X + gap, 240);
            }
        }
    }

    init();
</script>
</body>
</html>
